<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HireAI</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 320px;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f1117;
            color: #e4e4e7;
            overflow: hidden;
        }

        .popup-container {
            padding: 0;
        }

        /* Header */
        .popup-header {
            background: linear-gradient(135deg, #0f1117 0%, #1a1d2e 100%);
            padding: 20px 20px 16px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .popup-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 6px;
        }

        .popup-logo .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #10b981, #059669);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
            color: white;
            box-shadow: 0 2px 8px rgba(16, 185, 129, 0.3);
        }

        .popup-logo h1 {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #10b981, #34d399);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.3px;
        }

        .popup-subtitle {
            font-size: 11.5px;
            color: #71717a;
            margin-top: 2px;
        }

        /* Status */
        .status-section {
            padding: 16px 20px;
        }

        .status-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 10px;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #10b981;
            box-shadow: 0 0 8px rgba(16, 185, 129, 0.5);
            animation: pulse 2s infinite;
            flex-shrink: 0;
        }

        .status-dot.offline {
            background: #ef4444;
            box-shadow: 0 0 8px rgba(239, 68, 68, 0.5);
            animation: none;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        .status-info {
            flex: 1;
        }

        .status-label {
            font-size: 12px;
            font-weight: 600;
            color: #e4e4e7;
        }

        .status-detail {
            font-size: 11px;
            color: #71717a;
            margin-top: 2px;
        }

        /* Actions */
        .actions-section {
            padding: 0 20px 20px;
        }

        .activate-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-family: 'Inter', sans-serif;
            box-shadow: 0 2px 12px rgba(16, 185, 129, 0.25);
        }

        .activate-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(16, 185, 129, 0.4);
        }

        .activate-btn:active {
            transform: translateY(0);
        }

        .activate-btn svg {
            width: 16px;
            height: 16px;
        }

        .deactivate-btn {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #ef4444;
            box-shadow: none;
        }

        .deactivate-btn:hover {
            background: rgba(239, 68, 68, 0.15);
            box-shadow: none;
        }

        /* User info */
        .user-section {
            padding: 0 20px 16px;
        }

        .user-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 10px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 13px;
            color: white;
            flex-shrink: 0;
        }

        .user-info {
            flex: 1;
            min-width: 0;
        }

        .user-name {
            font-size: 12.5px;
            font-weight: 600;
            color: #e4e4e7;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .user-email {
            font-size: 11px;
            color: #71717a;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .not-logged-in {
            text-align: center;
            padding: 16px;
        }

        .not-logged-in p {
            font-size: 12px;
            color: #71717a;
            margin-bottom: 10px;
        }

        .login-link {
            display: inline-block;
            padding: 8px 20px;
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 8px;
            color: #818cf8;
            font-size: 12px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
        }

        .login-link:hover {
            background: rgba(99, 102, 241, 0.15);
        }

        /* Footer */
        .popup-footer {
            padding: 12px 20px;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }

        .popup-footer p {
            font-size: 10.5px;
            color: #52525b;
        }

        .popup-footer a {
            color: #10b981;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div class="popup-container">
        <!-- Header -->
        <div class="popup-header">
            <div class="popup-logo">
                <div class="logo-icon">H</div>
                <h1>HireAI</h1>
            </div>
            <p class="popup-subtitle">AI Assistant on Every Job Page</p>
        </div>

        <!-- User Section -->
        <div class="user-section" id="userSection" style="padding-top: 16px;">
            <div class="not-logged-in" id="notLoggedIn">
                <p>Please log in to HireAI to use the extension.</p>
                <button class="login-link" id="loginBtn">Log in to HireAI</button>
            </div>
            <div class="user-card" id="userCard" style="display: none;">
                <div class="user-avatar" id="userAvatar">?</div>
                <div class="user-info">
                    <div class="user-name" id="userName">Loading...</div>
                    <div class="user-email" id="userEmail">...</div>
                </div>
            </div>
        </div>

        <!-- Status -->
        <div class="status-section">
            <div class="status-card">
                <div class="status-dot" id="statusDot"></div>
                <div class="status-info">
                    <div class="status-label" id="statusLabel">Ready</div>
                    <div class="status-detail" id="statusDetail">Click below to activate on this page</div>
                </div>
            </div>
        </div>

        <!-- Action -->
        <div class="actions-section">
            <button class="activate-btn" id="activateBtn">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M5 12h14"></path>
                    <path d="M12 5l7 7-7 7"></path>
                </svg>
                Activate AI Assistant
            </button>
        </div>

        <!-- Footer -->
        <div class="popup-footer">
            <p>HireAI v1.0 · <a href="http://localhost:5173" target="_blank">Open Dashboard</a></p>
        </div>
    </div>

    <script src="popup.js"></script>
</body>

</html>
